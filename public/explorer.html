<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Tenet Explorer</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#0d1117; --surface:#161b22; --border:#30363d;
    --text:#e6edf3; --muted:#8b949e; --accent:#58a6ff;
    --green:#3fb950; --red:#f85149;
    --font:'Inter',system-ui,sans-serif;
  }
  body { background:var(--bg); color:var(--text); font-family:var(--font); font-size:14px; }
  a { color:var(--accent); text-decoration:none; } a:hover { text-decoration:underline; }

  .navbar { background:var(--surface); border-bottom:1px solid var(--border);
    padding:12px 24px; display:flex; align-items:center; gap:16px; position:sticky; top:0; z-index:10; }
  .logo { font-weight:700; font-size:18px; color:var(--accent); }
  .nav-links { display:flex; gap:20px; margin-left:auto; }
  .nav-links a { color:var(--muted); font-size:13px; }
  .nav-links a:hover, .nav-links a.active { color:var(--text); text-decoration:none; }

  .wrap { max-width:1200px; margin:0 auto; padding:24px; }

  .stats { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:12px; margin-bottom:24px; }
  .stat { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:16px; }
  .stat .lbl { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px; }
  .stat .val { font-size:20px; font-weight:600; }
  .stat .sub { font-size:11px; color:var(--muted); margin-top:2px; }

  .card { background:var(--surface); border:1px solid var(--border); border-radius:8px; margin-bottom:16px; }
  .card-hd { padding:14px 16px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between; }
  .card-hd h2 { font-size:14px; font-weight:600; }

  table { width:100%; border-collapse:collapse; }
  th { padding:10px 16px; text-align:left; font-size:11px; color:var(--muted);
    text-transform:uppercase; letter-spacing:.5px; border-bottom:1px solid var(--border); }
  td { padding:10px 16px; border-bottom:1px solid var(--border); font-size:13px; }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:rgba(255,255,255,.02); }

  .badge { display:inline-block; padding:2px 8px; border-radius:12px; font-size:11px; font-weight:600; }
  .bg  { background:rgba(63,185,80,.15);  color:var(--green); }
  .br  { background:rgba(248,81,73,.15);  color:var(--red); }
  .bb  { background:rgba(88,166,255,.15); color:var(--accent); }

  .mono { font-family:monospace; font-size:12px; }
  .link { color:var(--accent); cursor:pointer; } .link:hover { text-decoration:underline; }
  .pill { background:var(--bg); border:1px solid var(--border); border-radius:4px; padding:2px 6px; font-size:11px; font-family:monospace; }
  .spin { display:inline-block; width:14px; height:14px; border:2px solid var(--border);
    border-top-color:var(--accent); border-radius:50%; animation:sp .6s linear infinite; vertical-align:middle; }
  @keyframes sp { to { transform:rotate(360deg); } }
  .empty { padding:40px; text-align:center; color:var(--muted); }
  .dtbl td:first-child { color:var(--muted); width:160px; font-size:12px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;
const HOST  = `${location.protocol}//${location.host}`;
const RPC   = `${HOST}/rpc`;
const API   = `${HOST}/api`;

const rpc = async (m, p=[]) => {
  const r = await fetch(RPC,{ method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ jsonrpc:'2.0', method:m, params:p, id:1 }) });
  const j = await r.json();
  if (j.error) throw new Error(j.error.message);
  return j.result;
};
const api = async (p) => { const r = await fetch(`${API}${p}`); if(!r.ok) throw new Error(r.status); return r.json(); };

const sh = (h,n=8) => { if(!h) return '—'; const c=String(h).replace(/^0x/,''); return c.length>n*2?`${c.slice(0,n)}…${c.slice(-4)}`:c; };
const fn = n => n!=null ? Number(n).toLocaleString() : '—';
const ft = ts => { if(!ts) return '—'; const t=typeof ts==='number'&&ts<1e12?ts*1000:ts; return new Date(t).toLocaleString(); };

function Stat({lbl,val,sub}){ return <div className="stat"><div className="lbl">{lbl}</div><div className="val">{val??<span className="spin"/>}</div><div className="sub">{sub}</div></div>; }

function BlockRow({b,onClick}){ return (
  <tr>
    <td><a className="link" onClick={()=>onClick(b)}>#{b.index}</a></td>
    <td className="mono link" onClick={()=>onClick(b)}>{sh(b.hash)}</td>
    <td className="mono">{b.validator==='GENESIS'?<span className="badge bb">GENESIS</span>:sh(b.validator)}</td>
    <td>{b.transactions?.length??0}</td>
    <td>{b.slot}</td>
    <td>{ft(b.timestamp)}</td>
  </tr>
); }

function BlockDetail({b,onClose,onTxClick}){ return (
  <div className="card">
    <div className="card-hd"><h2>Block #{b.index}</h2>
      <button onClick={onClose} style={{background:'none',border:'none',color:'var(--muted)',cursor:'pointer',fontSize:18}}>✕</button>
    </div>
    <table className="dtbl"><tbody>
      <tr><td>Hash</td><td className="mono">{b.hash}</td></tr>
      <tr><td>Parent</td><td className="mono">{sh(b.previousHash,16)}</td></tr>
      <tr><td>Validator</td><td className="mono">{b.validator}</td></tr>
      <tr><td>Slot / Epoch</td><td>{b.slot} / {b.epoch}</td></tr>
      <tr><td>Time</td><td>{ft(b.timestamp)}</td></tr>
      <tr><td>Finalized</td><td>{b.finalized?<span className="badge bg">Yes</span>:<span className="badge br">No</span>}</td></tr>
      <tr><td>Transactions</td><td>{b.transactions?.length??0}</td></tr>
    </tbody></table>
    {b.transactions?.filter(t=>t.txId).length>0&&<>
      <div style={{padding:'10px 16px',borderTop:'1px solid var(--border)',fontSize:11,color:'var(--muted)'}}>TRANSACTIONS</div>
      <table><thead><tr><th>TxID</th><th>From</th><th>To</th><th>Amount</th></tr></thead><tbody>
        {b.transactions.filter(t=>t.txId).map(tx=>(
          <tr key={tx.txId}>
            <td className="mono link" onClick={()=>onTxClick(tx.txId)}>{sh(tx.txId)}</td>
            <td className="mono">{tx.from==='COINBASE'?<span className="badge bg">COINBASE</span>:sh(tx.from)}</td>
            <td className="mono">{sh(tx.to)}</td>
            <td><span className="pill">{tx.amount} TEN</span></td>
          </tr>
        ))}
      </tbody></table>
    </>}
  </div>
); }

function Blocks({onSearch}){
  const [blocks,setBlocks]=useState([]);
  const [sel,setSel]=useState(null);
  const load = useCallback(()=>api('/blocks?limit=25').then(r=>setBlocks(r.blocks)).catch(()=>{}),[]);
  useEffect(()=>{ load(); const id=setInterval(load,5000); return()=>clearInterval(id); },[]);
  return sel
    ? <BlockDetail b={sel} onClose={()=>setSel(null)} onTxClick={h=>{onSearch(h); setSel(null);}}/>
    : <div className="card">
        <div className="card-hd"><h2>Latest Blocks</h2></div>
        <table><thead><tr><th>Block</th><th>Hash</th><th>Validator</th><th>Txns</th><th>Slot</th><th>Time</th></tr></thead>
          <tbody>{blocks.length===0?<tr><td colSpan="6" className="empty">No blocks yet</td></tr>
            :blocks.map(b=><BlockRow key={b.hash} b={b} onClick={setSel}/>)}</tbody>
        </table>
      </div>;
}

function Validators(){
  const [data,setData]=useState(null);
  useEffect(()=>{ api('/validators').then(setData).catch(()=>{}); const id=setInterval(()=>api('/validators').then(setData),10000); return()=>clearInterval(id); },[]);
  return <div className="card">
    <div className="card-hd"><h2>Validators ({data?.count??'…'})</h2></div>
    <table><thead><tr><th>Address</th><th>Stake (TEN)</th><th>Status</th><th>Slashed</th><th>Epoch</th></tr></thead>
      <tbody>{!data?<tr><td colSpan="5" className="empty"><span className="spin"/></td></tr>
        :data.validators.map(v=><tr key={v.address}>
          <td className="mono">{v.address}</td>
          <td>{fn(v.stake)}</td>
          <td>{v.active?<span className="badge bg">Active</span>:<span className="badge br">Inactive</span>}</td>
          <td>{v.slashed?<span className="badge br">Yes</span>:'—'}</td>
          <td>{v.joinedEpoch??'—'}</td>
        </tr>)}
      </tbody>
    </table>
  </div>;
}

function Supply(){
  const [s,setS]=useState(null);
  useEffect(()=>{ api('/supply').then(setS).catch(()=>{}); const id=setInterval(()=>api('/supply').then(setS),10000); return()=>clearInterval(id); },[]);
  if(!s) return <div className="card"><div className="empty"><span className="spin"/></div></div>;
  const rows=[
    ['Total Supply (Hard Cap)',s.totalSupply,'Immutable genesis cap'],
    ['Minted Supply',s.mintedSupply,'Created by validators'],
    ['Circulating Supply',s.circulatingSupply,'Minted − burned − pool'],
    ['Staked Supply',s.stakedSupply,'Locked by validators'],
    ['Locked (Vesting)',s.lockedSupply,'Vesting-locked'],
    ['Burned Supply',s.burnedSupply,'Permanently destroyed'],
    ['Emission Pool',s.emissionPool,'Staking rewards remaining'],
    ['Remaining Mint Cap',s.remainingMintCap,'Before hard cap hit'],
  ];
  return <div className="card">
    <div className="card-hd"><h2>Supply Breakdown</h2></div>
    <table className="dtbl"><tbody>{rows.map(([l,v,n])=><tr key={l}>
      <td>{l}</td>
      <td><strong>{fn(v)}</strong> TEN {' '}
        <span style={{color:'var(--muted)',fontSize:11}}>({s.totalSupply>0?((v/s.totalSupply)*100).toFixed(3):0}%) — {n}</span>
      </td>
    </tr>)}</tbody></table>
  </div>;
}

function SearchView({q}){
  const [r,setR]=useState(null); const [err,setErr]=useState(null);
  useEffect(()=>{
    setR(null); setErr(null); const clean=q.trim().replace(/^0x/,'');
    api(`/tx/${clean}`).then(d=>setR({t:'tx',d})).catch(()=>
      api(`/blocks/${clean}`).then(d=>setR({t:'block',d})).catch(()=>
        api(`/address/${q.trim()}`).then(d=>setR({t:'addr',d})).catch(()=>setErr('Not found'))
      )
    );
  },[q]);
  if(err) return <div className="card"><div className="empty">"{q}" — {err}</div></div>;
  if(!r)  return <div className="card"><div className="empty"><span className="spin"/> Searching…</div></div>;
  if(r.t==='block') return <BlockDetail b={r.d} onClose={()=>setR(null)} onTxClick={()=>{}}/>;
  if(r.t==='tx'){ const {tx,blockIndex,blockHash,status}=r.d; return <div className="card">
    <div className="card-hd"><h2>Transaction</h2></div>
    <table className="dtbl"><tbody>
      <tr><td>TxID</td><td className="mono">{tx?.txId}</td></tr>
      <tr><td>From</td><td className="mono">{tx?.from}</td></tr>
      <tr><td>To</td><td className="mono">{tx?.to}</td></tr>
      <tr><td>Amount</td><td><span className="pill">{tx?.amount} TEN</span></td></tr>
      <tr><td>Nonce</td><td>{tx?.nonce}</td></tr>
      <tr><td>Status</td><td><span className={`badge ${status==='finalized'?'bg':'bb'}`}>{status}</span></td></tr>
      <tr><td>Block</td><td>#{blockIndex} — <span className="mono">{sh(blockHash,12)}</span></td></tr>
    </tbody></table>
  </div>; }
  if(r.t==='addr'){ const d=r.d; return <div className="card">
    <div className="card-hd"><h2>Address</h2></div>
    <table className="dtbl"><tbody>
      <tr><td>Address</td><td className="mono">{d.address}</td></tr>
      <tr><td>Balance</td><td>{fn(d.balance)} TEN</td></tr>
      <tr><td>Spendable</td><td>{fn(d.spendable)} TEN</td></tr>
      <tr><td>Locked</td><td>{fn(d.locked)} TEN (vesting)</td></tr>
      <tr><td>Staked</td><td>{fn(d.staked)} TEN</td></tr>
      <tr><td>Nonce</td><td>{d.nonce}</td></tr>
    </tbody></table>
  </div>; }
  return null;
}

function App(){
  const [tab,setTab]=useState('blocks');
  const [info,setInfo]=useState(null);
  const [supply,setSupply]=useState(null);
  const [q,setQ]=useState('');
  const [search,setSearch]=useState('');

  useEffect(()=>{
    const load=()=>{
      rpc('ten_chainInfo').then(setInfo).catch(()=>rpc('sfc_getChainInfo').then(setInfo).catch(()=>{}));
      api('/supply').then(setSupply).catch(()=>{});
    };
    load(); const id=setInterval(load,5000); return()=>clearInterval(id);
  },[]);

  const doSearch=v=>{ const s=v.trim(); if(s){ setSearch(s); setTab('search'); } };

  return <>
    <nav className="navbar">
      <span className="logo">⬡ Tenet Explorer</span>
      <div className="nav-links">
        {['blocks','validators','supply'].map(t=>(
          <a key={t} href="#" className={tab===t?'active':''} onClick={e=>{e.preventDefault();setTab(t);setSearch('');}}>
            {t[0].toUpperCase()+t.slice(1)}
          </a>
        ))}
      </div>
      <form onSubmit={e=>{e.preventDefault();doSearch(q);}} style={{display:'flex',gap:6}}>
        <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search block / tx / address"
          style={{background:'var(--bg)',border:'1px solid var(--border)',color:'var(--text)',borderRadius:6,padding:'6px 12px',fontSize:13,width:280}}/>
        <button type="submit" style={{background:'var(--accent)',color:'#000',border:'none',borderRadius:6,padding:'6px 14px',fontWeight:600,cursor:'pointer'}}>Go</button>
      </form>
    </nav>
    <div className="wrap">
      <div className="stats">
        <Stat lbl="Block Height"  val={fn(info?.height)}          sub={`Slot ${info?.latestSlot??'—'}`}/>
        <Stat lbl="Validators"    val={fn(info?.validators)}       sub={`Staked: ${fn(info?.totalStake)} TEN`}/>
        <Stat lbl="Mempool"       val={fn(info?.mempoolSize)}      sub="pending txs"/>
        <Stat lbl="Block Reward"  val={`${info?.blockReward??'—'} TEN`} sub={`Fee: ${info?.txFee??'—'} TEN/tx`}/>
        <Stat lbl="Circulating"   val={fn(supply?.circulatingSupply)} sub="TEN in free circulation"/>
        <Stat lbl="Burned"        val={fn(supply?.burnedSupply)}   sub="permanently destroyed"/>
      </div>
      {tab==='search' && search && <SearchView q={search}/>}
      {tab==='blocks'     && <Blocks onSearch={doSearch}/>}
      {tab==='validators' && <Validators/>}
      {tab==='supply'     && <Supply/>}
    </div>
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
