<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Tenet Wallet</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<!-- elliptic for key generation + signing in-browser -->
<script src="https://unpkg.com/elliptic@6.5.4/dist/elliptic.min.js"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e;
    --accent:#58a6ff;--green:#3fb950;--red:#f85149;--font:'Inter',system-ui,sans-serif}
  body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;min-height:100vh}
  .page{max-width:560px;margin:0 auto;padding:32px 16px}
  h1{font-size:22px;font-weight:700;color:var(--accent);margin-bottom:4px}
  .sub{color:var(--muted);font-size:13px;margin-bottom:28px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:16px}
  .card h2{font-size:14px;font-weight:600;margin-bottom:14px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  label{font-size:12px;color:var(--muted);display:block;margin-bottom:4px;margin-top:12px}
  label:first-of-type{margin-top:0}
  input,textarea{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);
    border-radius:6px;padding:9px 12px;font-size:13px;font-family:inherit}
  input:focus,textarea:focus{outline:none;border-color:var(--accent)}
  textarea{resize:vertical;min-height:72px;font-family:monospace;font-size:11px}
  .btn{display:block;width:100%;padding:11px;border-radius:6px;border:none;font-size:14px;
    font-weight:600;cursor:pointer;margin-top:14px;transition:opacity .15s}
  .btn:hover{opacity:.85}
  .btn-primary{background:var(--accent);color:#000}
  .btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
  .row{display:flex;gap:8px;align-items:center}
  .row input{flex:1}
  .copy-btn{padding:9px 14px;background:var(--border);border:none;color:var(--text);border-radius:6px;cursor:pointer;font-size:12px;white-space:nowrap}
  .copy-btn:hover{background:var(--accent);color:#000}
  .mono{font-family:monospace;font-size:12px;word-break:break-all}
  .badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600}
  .bg{background:rgba(63,185,80,.15);color:var(--green)}
  .br{background:rgba(248,81,73,.15);color:var(--red)}
  .bb{background:rgba(88,166,255,.15);color:var(--accent)}
  .warn{background:rgba(210,153,34,.12);border:1px solid rgba(210,153,34,.3);border-radius:6px;
    padding:10px 12px;font-size:12px;color:#d29922;margin-top:12px}
  .balance-big{font-size:32px;font-weight:700;color:var(--accent);margin:8px 0 4px}
  .balance-sub{font-size:12px;color:var(--muted)}
  .addr{font-size:12px;font-family:monospace;color:var(--muted);word-break:break-all;margin-top:4px}
  .divider{border:none;border-top:1px solid var(--border);margin:20px 0}
  .msg{padding:10px 12px;border-radius:6px;font-size:13px;margin-top:10px}
  .msg-ok{background:rgba(63,185,80,.1);border:1px solid rgba(63,185,80,.3);color:var(--green)}
  .msg-err{background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.3);color:var(--red)}
  .spin{display:inline-block;width:12px;height:12px;border:2px solid var(--border);
    border-top-color:var(--accent);border-radius:50%;animation:sp .6s linear infinite;vertical-align:middle}
  @keyframes sp{to{transform:rotate(360deg)}}
  .tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:20px}
  .tab{padding:9px 16px;cursor:pointer;font-size:13px;color:var(--muted);
    border-bottom:2px solid transparent;margin-bottom:-1px}
  .tab.on{color:var(--accent);border-bottom-color:var(--accent)}
  .hist-row{padding:10px 0;border-bottom:1px solid var(--border);font-size:12px}
  .hist-row:last-child{border-bottom:none}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const HOST = `${location.protocol}//${location.host}`;

// ── Crypto helpers (secp256k1 via elliptic CDN) ───────────────────────────────
const EC_CURVE = new elliptic.ec('secp256k1');

function sha256hex(str) {
  // Simple SHA-256 via SubtleCrypto (async, but we wrap it)
  const buf = new TextEncoder().encode(typeof str === 'object' ? JSON.stringify(str) : str);
  return crypto.subtle.digest('SHA-256', buf).then(ab =>
    Array.from(new Uint8Array(ab)).map(b => b.toString(16).padStart(2,'0')).join('')
  );
}

function generateWallet() {
  const kp  = EC_CURVE.genKeyPair();
  const pub  = kp.getPublic('hex');
  const priv = kp.getPrivate('hex');
  // Derive address: SHA-256 of pubkey, take last 20 bytes (simplified — matches utils/crypto.js)
  const hashWords = pub; // placeholder; real derivation needs sha256 of pub
  return { privateKey: priv, publicKey: pub, _kp: kp };
}

async function deriveAddress(publicKey) {
  const hash = await sha256hex(publicKey);
  return '0x' + hash.slice(24);  // last 20 bytes = 40 hex chars
}

async function signPayload(payload, privateKey) {
  const kp  = EC_CURVE.keyFromPrivate(privateKey, 'hex');
  const hash = await sha256hex(payload);
  const sig  = kp.sign(hash, 'hex', { canonical: true });
  return sig.toDER('hex');
}

// ── RPC call ─────────────────────────────────────────────────────────────────
async function rpcCall(method, params = []) {
  const r = await fetch(`${HOST}/rpc`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ jsonrpc: '2.0', method, params, id: 1 }),
  });
  const j = await r.json();
  if (j.error) throw new Error(j.error.message);
  return j.result;
}

// ── Wallet state (session-only; prod should use encrypted localStorage) ───────
const WalletCtx = {};

// ── Components ────────────────────────────────────────────────────────────────

function CreateWallet({ onCreated }) {
  const [wallet, setWallet] = useState(null);
  const [addr,   setAddr]   = useState('');
  const [copied, setCopied] = useState('');

  const create = async () => {
    const w = generateWallet();
    const a = await deriveAddress(w.publicKey);
    setWallet({ ...w, address: a });
    setAddr(a);
    onCreated({ ...w, address: a });
  };

  const copy = (text, key) => {
    navigator.clipboard.writeText(text).then(() => { setCopied(key); setTimeout(() => setCopied(''), 2000); });
  };

  return (
    <div className="card">
      <h2>Create New Wallet</h2>
      {!wallet ? (
        <>
          <p style={{ color: 'var(--muted)', fontSize: 13, marginBottom: 14 }}>
            Generate a new secp256k1 keypair. Your private key is never sent to the server.
          </p>
          <button className="btn btn-primary" onClick={create}>Generate Wallet</button>
        </>
      ) : (
        <>
          <label>Address</label>
          <div className="row">
            <input readOnly value={wallet.address} className="mono"/>
            <button className="copy-btn" onClick={() => copy(wallet.address, 'addr')}>
              {copied === 'addr' ? '✓ Copied' : 'Copy'}
            </button>
          </div>

          <label>Public Key</label>
          <div className="row">
            <input readOnly value={wallet.publicKey} className="mono"/>
            <button className="copy-btn" onClick={() => copy(wallet.publicKey, 'pub')}>
              {copied === 'pub' ? '✓ Copied' : 'Copy'}
            </button>
          </div>

          <label>Private Key</label>
          <div className="row">
            <input readOnly value={wallet.privateKey} className="mono" type="password"
              onMouseEnter={e => e.target.type='text'} onMouseLeave={e => e.target.type='password'}/>
            <button className="copy-btn" onClick={() => copy(wallet.privateKey, 'priv')}>
              {copied === 'priv' ? '✓ Copied' : 'Copy'}
            </button>
          </div>
          <div className="warn">
            ⚠ Save your private key offline. This page does NOT store it. Losing it means losing your funds.
          </div>
        </>
      )}
    </div>
  );
}

function ImportWallet({ onImported }) {
  const [priv, setPriv] = useState('');
  const [err,  setErr]  = useState('');

  const doImport = async () => {
    try {
      setErr('');
      const kp   = EC_CURVE.keyFromPrivate(priv.trim(), 'hex');
      const pub  = kp.getPublic('hex');
      const addr = await deriveAddress(pub);
      onImported({ privateKey: priv.trim(), publicKey: pub, address: addr, _kp: kp });
    } catch(e) { setErr('Invalid private key'); }
  };

  return (
    <div className="card">
      <h2>Import Wallet</h2>
      <label>Private Key (hex)</label>
      <input type="password" value={priv} onChange={e => setPriv(e.target.value)}
        placeholder="Your secp256k1 private key (64 hex chars)"/>
      {err && <div className="msg msg-err">{err}</div>}
      <button className="btn btn-primary" onClick={doImport} disabled={!priv.trim()}>Import</button>
    </div>
  );
}

function BalanceCard({ wallet }) {
  const [balance, setBalance] = useState(null);
  const [loading, setLoading] = useState(false);

  const refresh = useCallback(async () => {
    if (!wallet?.address) return;
    setLoading(true);
    try {
      const r = await rpcCall('sfc_getBalance', [wallet.address]);
      setBalance(r);
    } catch (e) { console.error(e); }
    finally { setLoading(false); }
  }, [wallet?.address]);

  useEffect(() => {
    refresh();
    const id = setInterval(refresh, 10000);
    return () => clearInterval(id);
  }, [refresh]);

  const faucet = async () => {
    try {
      await rpcCall('sfc_requestFaucet', [wallet.address]);
      refresh();
    } catch (e) { alert(e.message); }
  };

  return (
    <div className="card">
      <h2>Balance {loading && <span className="spin"/>}</h2>
      <div className="balance-big">{balance?.liquid ?? '…'} TEN</div>
      <div className="balance-sub">
        Spendable: {balance?.spendable ?? '…'} TEN
        {balance?.locked > 0 && ` | Locked: ${balance.locked} TEN`}
        {balance?.staked > 0 && ` | Staked: ${balance.staked} TEN`}
      </div>
      <div className="addr">{wallet.address}</div>
      <button className="btn btn-outline" onClick={faucet} style={{ marginTop: 12 }}>
        Request Testnet TEN (Faucet)
      </button>
    </div>
  );
}

function SendTEN({ wallet }) {
  const [to,     setTo]     = useState('');
  const [amount, setAmount] = useState('');
  const [msg,    setMsg]    = useState(null);
  const [busy,   setBusy]   = useState(false);

  const send = async () => {
    setBusy(true); setMsg(null);
    try {
      if (!to.match(/^0x[0-9a-fA-F]{40}$/)) throw new Error('Invalid recipient address');
      const amt = Number(amount);
      if (!amt || amt <= 0) throw new Error('Amount must be positive');

      // Get nonce
      const nonceHex = await rpcCall('eth_getTransactionCount', [wallet.address]);
      const nonce    = parseInt(nonceHex, 16);
      const timestamp = Date.now();

      const payload  = { from: wallet.address, to, amount: amt, nonce, timestamp };
      const payloadStr = JSON.stringify(payload);
      const signature  = await signPayload(payloadStr, wallet.privateKey);

      // Compute txId
      const txId = await sha256hex(payload);

      const txData = {
        from:      wallet.address,
        to,
        amount:    amt,
        nonce,
        timestamp,
        publicKey: wallet.publicKey,
        signature,
        txId,
      };

      const result = await rpcCall('sfc_sendTransaction', [txData]);
      setMsg({ ok: true, text: `Transaction submitted! TxID: ${result.txId}` });
      setTo(''); setAmount('');
    } catch (e) {
      setMsg({ ok: false, text: e.message });
    } finally { setBusy(false); }
  };

  return (
    <div className="card">
      <h2>Send TEN</h2>
      <label>Recipient Address</label>
      <input value={to} onChange={e => setTo(e.target.value)} placeholder="0x…" className="mono"/>
      <label>Amount (TEN)</label>
      <input type="number" value={amount} onChange={e => setAmount(e.target.value)}
        placeholder="0" min="1" step="1"/>
      <div style={{ fontSize: 11, color: 'var(--muted)', marginTop: 6 }}>
        + 1 TEN transaction fee (0.2 burned, 0.8 to validator)
      </div>
      <button className="btn btn-primary" onClick={send} disabled={busy || !to || !amount}>
        {busy ? <><span className="spin"/> Sending…</> : 'Send TEN'}
      </button>
      {msg && <div className={`msg ${msg.ok ? 'msg-ok' : 'msg-err'}`}>{msg.text}</div>}
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [wallet, setWallet] = useState(null);
  const [tab,    setTab]    = useState('create');

  const handleWallet = w => { setWallet(w); setTab('balance'); };

  return (
    <div className="page">
      <h1>⬡ Tenet Wallet</h1>
      <p className="sub">Testnet wallet for Tenet (TEN) — Chain ID {window.CHAIN_ID || 2049}</p>

      {!wallet ? (
        <>
          <div className="tabs">
            {['create','import'].map(t => (
              <div key={t} className={`tab ${tab===t?'on':''}`} onClick={() => setTab(t)}>
                {t === 'create' ? 'Create Wallet' : 'Import Wallet'}
              </div>
            ))}
          </div>
          {tab === 'create' && <CreateWallet onCreated={handleWallet}/>}
          {tab === 'import' && <ImportWallet onImported={handleWallet}/>}
        </>
      ) : (
        <>
          <BalanceCard wallet={wallet}/>
          <SendTEN wallet={wallet}/>
          <button className="btn btn-outline" onClick={() => { setWallet(null); setTab('create'); }}>
            Disconnect Wallet
          </button>
          <hr className="divider"/>
          <p style={{ fontSize: 12, color: 'var(--muted)', textAlign: 'center' }}>
            <a href="/explorer.html">Open Block Explorer →</a>
          </p>
        </>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
