# deploy/nginx.conf
# Nginx reverse proxy for Tenet RPC + Explorer
# Place at: /etc/nginx/sites-available/tenet
# Enable: ln -s /etc/nginx/sites-available/tenet /etc/nginx/sites-enabled/
#
# After enabling: certbot --nginx -d your-domain.com

server {
    listen 80;
    server_name your-node.tenet.network;  # replace with your domain

    # Redirect HTTP → HTTPS (certbot adds this automatically)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name your-node.tenet.network;

    # SSL managed by certbot
    # ssl_certificate /etc/letsencrypt/live/your-node.tenet.network/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/your-node.tenet.network/privkey.pem;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Content-Security-Policy "default-src 'self' https: 'unsafe-inline' 'unsafe-eval'";

    # JSON-RPC endpoint (rate-limited at app level)
    location /rpc {
        proxy_pass         http://127.0.0.1:3000/rpc;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
        proxy_body_size    32k;
    }

    # REST Explorer API
    location /api/ {
        proxy_pass         http://127.0.0.1:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # Static explorer + wallet frontend
    location / {
        proxy_pass         http://127.0.0.1:3000/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # Health check endpoint (public)
    location /health {
        proxy_pass http://127.0.0.1:3000/health;
    }
}
